<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Slide rectangle with rounded corners -->
  <rect x="4" y="12" width="56" height="40" rx="6" ry="6" fill="#2563eb"/>
  <!-- Film strip notches top -->
  <rect x="10" y="12" width="5" height="4" rx="1" fill="#1a1a2e"/>
  <rect x="20" y="12" width="5" height="4" rx="1" fill="#1a1a2e"/>
  <rect x="30" y="12" width="5" height="4" rx="1" fill="#1a1a2e"/>
  <rect x="40" y="12" width="5" height="4" rx="1" fill="#1a1a2e"/>
  <rect x="50" y="12" width="5" height="4" rx="1" fill="#1a1a2e"/>
  <!-- Film strip notches bottom -->
  <rect x="10" y="48" width="5" height="4" rx="1" fill="#1a1a2e"/>
  <rect x="20" y="48" width="5" height="4" rx="1" fill="#1a1a2e"/>
  <rect x="30" y="48" width="5" height="4" rx="1" fill="#1a1a2e"/>
  <rect x="40" y="48" width="5" height="4" rx="1" fill="#1a1a2e"/>
  <rect x="50" y="48" width="5" height="4" rx="1" fill="#1a1a2e"/>
  <!-- Play triangle -->
  <polygon points="26,24 26,40 42,32" fill="#ffffff"/>
</svg>
